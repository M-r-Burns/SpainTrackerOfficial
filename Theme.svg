<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2027" />
      <stop offset="50%" stop-color="#203a43" />
      <stop offset="100%" stop-color="#2c5364" />
    </linearGradient>
    
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c5364" />
      <stop offset="100%" stop-color="#0f2027" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#skyGrad)" />
  
  <rect y="400" width="800" height="200" fill="url(#waterGrad)" />

  <g text-anchor="middle" font-family="'Courier New', Courier, monospace" font-weight="bold">
    <text x="400" y="110" font-size="80" fill="#ffffff" opacity="0.08" letter-spacing="12">&lt;SPANISH/&gt;</text>
    <text x="400" y="220" font-size="80" fill="#ffffff" opacity="0.08" letter-spacing="12">CODING { }</text>
    
    <text x="400" y="150" font-size="42" fill="#4fc3f7" filter="url(#glow)" letter-spacing="4">SPANISH &amp; CODING</text>
    <text x="400" y="180" font-size="16" fill="#e0e0e0" letter-spacing="2" opacity="0.8">// Valencia, España</text>
  </g>

  <g transform="translate(20, 0)">
    <path d="M 120 400 Q 320 230 520 400" fill="none" stroke="#e0e0e0" stroke-width="5" />
    <path d="M 170 400 Q 320 260 470 400" fill="none" stroke="#ffffff" stroke-width="3" />
    <path d="M 240 400 A 80 60 0 0 1 400 400" fill="#81d4fa" opacity="0.85" />
    
    <path d="M 190 400 Q 320 270 450 400" fill="none" stroke="#b0bec5" stroke-width="1.5" />
    <path d="M 210 400 Q 320 280 430 400" fill="none" stroke="#b0bec5" stroke-width="1.5" />
    <path d="M 230 400 Q 320 290 410 400" fill="none" stroke="#b0bec5" stroke-width="1.5" />
  </g>

  <g stroke="#ffffff" fill="none" stroke-width="3" stroke-linejoin="round" transform="translate(20, 0)">
    <polyline points="540,400 560,310 570,400" />
    <polyline points="580,400 600,320 610,400" />
    <polyline points="620,400 640,335 650,400" />
    <polyline points="660,400 680,355 690,400" />
    <polyline points="700,400 720,380 730,400" />
    <path d="M 540 400 Q 635 370 730 400" stroke="#b0bec5" stroke-width="1.5" />
  </g>

  <g transform="translate(20, 0)" opacity="0.35">
    <path d="M 120 400 Q 320 570 520 400" fill="none" stroke="#e0e0e0" stroke-width="5" />
    <path d="M 170 400 Q 320 540 470 400" fill="none" stroke="#ffffff" stroke-width="3" />
    <path d="M 240 400 A 80 60 0 0 0 400 400" fill="#81d4fa" opacity="0.85" />
    <path d="M 190 400 Q 320 530 450 400" fill="none" stroke="#b0bec5" stroke-width="1.5" />
    <path d="M 210 400 Q 320 520 430 400" fill="none" stroke="#b0bec5" stroke-width="1.5" />
    <path d="M 230 400 Q 320 510 410 400" fill="none" stroke="#b0bec5" stroke-width="1.5" />
  </g>

  <g stroke="#ffffff" fill="none" stroke-width="3" stroke-linejoin="round" transform="translate(20, 0)" opacity="0.35">
    <polyline points="540,400 560,490 570,400" />
    <polyline points="580,400 600,480 610,400" />
    <polyline points="620,400 640,465 650,400" />
    <polyline points="660,400 680,445 690,400" />
    <polyline points="700,400 720,420 730,400" />
    <path d="M 540 400 Q 635 430 730 400" stroke="#b0bec5" stroke-width="1.5" />
  </g>

  <line x1="0" y1="400" x2="800" y2="400" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  
  <g stroke="#ffffff" stroke-width="1" opacity="0.15">
    <line x1="80" y1="430" x2="720" y2="430" />
    <line x1="120" y1="470" x2="680" y2="470" />
    <line x1="160" y1="520" x2="640" y2="520" />
    <line x1="220" y1="570" x2="580" y2="570" />
  </g>
</svg>
